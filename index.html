<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Return Abuse Benchmark Calculator — Forter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forter-blue:    #005DE8;
      --forter-cobalt:  #2A8BFF;
      --forter-black:   #080D15;
      --forter-navy:    #1E283D;
      --zircon:         #DFEEFF;
      --white:          #FFFFFF;
      --text-primary:   #080D15;
      --text-secondary: #4A5568;
      --text-muted:     #7B8CA3;
      --border:         #CBD8EC;
      --border-light:   #E5EDF8;
      --green:          #16A34A;
      --green-bg:       #DCFCE7;
      --amber:          #D97706;
      --amber-bg:       #FEF3C7;
      --red:            #DC2626;
      --red-bg:         #FEE2E2;
      --shadow-sm: 0 1px 3px rgba(8,13,21,0.08);
      --shadow-md: 0 4px 12px rgba(8,13,21,0.10);
      --shadow-lg: 0 10px 30px rgba(0,93,232,0.12);
    }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--zircon); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
    h1,h2,h3,h4 { font-family:'Poppins',sans-serif; }
    .hidden { display:none !important; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }

    header { position:fixed; top:0; left:0; right:0; z-index:100; background:var(--forter-black); border-bottom:1px solid rgba(255,255,255,.08); height:64px; display:flex; align-items:center; padding:0 40px; }
    .logo img { height:28px; display:block; }

    main { padding-top:64px; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

    .intro-screen { max-width:700px; width:100%; padding:80px 24px 100px; text-align:center; animation:fadeUp .5s ease both; }
    .intro-kicker { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; background:rgba(0,93,232,.08); border:1px solid rgba(0,93,232,.2); border-radius:20px; font-size:12px; font-weight:600; color:var(--forter-blue); letter-spacing:.5px; text-transform:uppercase; margin-bottom:28px; }
    .intro-headline { font-size:52px; font-weight:800; line-height:1.1; letter-spacing:-1.5px; color:var(--forter-black); margin-bottom:20px; }
    .intro-headline em { font-style:normal; color:var(--forter-blue); }
    .intro-sub { font-size:18px; line-height:1.7; color:var(--text-secondary); margin-bottom:44px; }
    .stat-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:44px; }
    .stat-item { background:var(--white); border:1px solid var(--border-light); border-radius:14px; padding:20px 16px; text-align:center; box-shadow:var(--shadow-sm); }
    .stat-value { font-family:'Poppins',sans-serif; font-size:26px; font-weight:700; color:var(--forter-blue); display:block; }
    .stat-label { font-size:12px; color:var(--text-secondary); margin-top:4px; line-height:1.4; }
    .stat-source { font-size:10px; color:var(--text-muted); margin-top:4px; }
    .cta-primary { display:inline-flex; align-items:center; gap:10px; padding:16px 36px; background:var(--forter-blue); color:var(--white); font-family:'Poppins',sans-serif; font-size:16px; font-weight:600; border:none; border-radius:10px; cursor:pointer; transition:all .2s; box-shadow:0 4px 16px rgba(0,93,232,.3); }
    .cta-primary:hover { background:#0050C8; transform:translateY(-1px); }
    .cta-meta { font-size:13px; color:var(--text-muted); margin-top:14px; }

    .wizard-screen { max-width:680px; width:100%; padding:60px 24px 80px; animation:fadeUp .4s ease both; }
    .progress-wrap { margin-bottom:36px; }
    .progress-meta { display:flex; justify-content:space-between; font-size:13px; color:var(--text-muted); margin-bottom:10px; }
    .progress-track { height:4px; background:var(--border-light); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--forter-blue),var(--forter-cobalt)); border-radius:4px; transition:width .4s ease; }
    .step-labels { display:flex; justify-content:space-between; margin-top:8px; }
    .step-label { font-size:11px; color:var(--text-muted); flex:1; text-align:center; }
    .step-label:first-child { text-align:left; }
    .step-label:last-child  { text-align:right; }
    .step-label.active { color:var(--forter-blue); font-weight:600; }

    .question-card { background:var(--white); border:1px solid var(--border-light); border-radius:18px; padding:40px; margin-bottom:20px; box-shadow:var(--shadow-md); }
    .question-number { font-size:12px; font-weight:600; color:var(--forter-blue); letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px; }
    .question-title { font-size:22px; font-weight:700; color:var(--forter-black); margin-bottom:6px; line-height:1.35; }
    .question-sub { font-size:14px; color:var(--text-secondary); margin-bottom:28px; line-height:1.5; }

    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .options-grid.cols-3 { grid-template-columns:1fr 1fr 1fr; }
    .option-btn { background:var(--white); border:1.5px solid var(--border); border-radius:12px; padding:16px 18px; cursor:pointer; transition:all .18s ease; text-align:left; color:var(--text-primary); display:flex; flex-direction:column; gap:5px; }
    .option-btn:hover { border-color:var(--forter-cobalt); background:rgba(0,93,232,.03); }
    .option-btn.selected { background:rgba(0,93,232,.06); border-color:var(--forter-blue); box-shadow:0 0 0 3px rgba(0,93,232,.10); }
    .option-icon { font-size:18px; margin-bottom:2px; }
    .option-label { font-size:14px; font-weight:600; color:var(--forter-black); }
    .option-desc { font-size:12px; color:var(--text-secondary); line-height:1.4; }

    .option-check { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; margin-left:auto; margin-top:6px; flex-shrink:0; transition:all .18s; }
    .option-btn.selected .option-check { background:var(--forter-blue); border-color:var(--forter-blue); }
    .option-check::after { content:''; width:5px; height:7px; border-right:2px solid var(--white); border-bottom:2px solid var(--white); transform:rotate(45deg) translate(-1px,-1px); display:none; }
    .option-btn.selected .option-check::after { display:block; }

    .option-checkbox { width:18px; height:18px; border-radius:4px; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; margin-left:auto; margin-top:6px; flex-shrink:0; transition:all .18s; }
    .option-btn.selected .option-checkbox { background:var(--forter-blue); border-color:var(--forter-blue); }
    .option-checkbox::after { content:''; width:5px; height:7px; border-right:2px solid var(--white); border-bottom:2px solid var(--white); transform:rotate(45deg) translate(-1px,-1px); display:none; }
    .option-btn.selected .option-checkbox::after { display:block; }

    .gmv-refine { margin-top:20px; padding:16px 18px; background:rgba(0,93,232,.04); border:1px dashed rgba(0,93,232,.25); border-radius:10px; animation:fadeUp .3s ease both; }
    .gmv-refine-label { font-size:13px; font-weight:600; color:var(--forter-blue); margin-bottom:6px; }
    .gmv-refine-sub { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
    .gmv-refine-row { display:flex; align-items:center; gap:8px; }
    .gmv-refine-row span { font-size:14px; color:var(--text-secondary); font-weight:600; }
    .gmv-refine-row input { flex:1; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:14px; color:var(--forter-black); outline:none; }
    .gmv-refine-row input:focus { border-color:var(--forter-blue); box-shadow:0 0 0 3px rgba(0,93,232,.10); }

    .wizard-nav { display:flex; gap:12px; }
    .btn-back { padding:13px 26px; background:var(--white); border:1.5px solid var(--border); border-radius:10px; color:var(--text-secondary); font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; }
    .btn-back:hover { border-color:var(--forter-navy); color:var(--forter-black); }
    .btn-next { flex:1; padding:13px 28px; background:var(--forter-blue); border:none; border-radius:10px; color:var(--white); font-family:'Inter',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all .
